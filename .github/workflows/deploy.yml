name: Deploy to AWS ECS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      APP_NAME: ${{ vars.APP_NAME || 'research-notebook' }}
      TF_VAR_app_name: ${{ vars.APP_NAME || 'research-notebook' }}
      TF_VAR_environment: prod
      TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
      TF_VAR_database_url: ${{ secrets.DATABASE_URL }}
      TF_VAR_gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
      TF_VAR_github_token: ${{ secrets.GITHUB_TOKEN }}
      TF_VAR_frontend_image_tag: ${{ github.sha }}
      TF_VAR_backend_image_tag: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Resolve AWS account ID
        id: aws-account
        run: echo "account_id=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_OUTPUT"

      - name: Ensure Terraform state bucket
        id: tfstate
        run: |
          TF_STATE_BUCKET="${APP_NAME}-tfstate-${{ steps.aws-account.outputs.account_id }}"
          echo "bucket=$TF_STATE_BUCKET" >> "$GITHUB_OUTPUT"

          if aws s3api head-bucket --bucket "$TF_STATE_BUCKET" 2>/dev/null; then
            echo "Terraform state bucket exists: $TF_STATE_BUCKET"
          else
            echo "Creating Terraform state bucket: $TF_STATE_BUCKET"
            if [ "$AWS_REGION" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "$TF_STATE_BUCKET"
            else
              aws s3api create-bucket --bucket "$TF_STATE_BUCKET" --create-bucket-configuration "LocationConstraint=$AWS_REGION"
            fi
          fi

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: infra/terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ steps.tfstate.outputs.bucket }}" \
            -backend-config="key=ecs/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}"

      - name: Bootstrap ECR repositories
        run: |
          for repo in "${APP_NAME}-backend" "${APP_NAME}-frontend"; do
            if aws ecr describe-repositories --region "$AWS_REGION" --repository-names "$repo" >/dev/null 2>&1; then
              echo "ECR repository exists: $repo"
            else
              echo "Creating ECR repository: $repo"
              aws ecr create-repository \
                --region "$AWS_REGION" \
                --repository-name "$repo" \
                --image-scanning-configuration scanOnPush=true >/dev/null
            fi
          done

      - name: Import ECR repositories into Terraform state
        working-directory: infra/terraform
        run: |
          terraform import aws_ecr_repository.frontend "${APP_NAME}-frontend" || true
          terraform import aws_ecr_repository.backend "${APP_NAME}-backend" || true

      - name: Import existing AWS resources into Terraform state
        working-directory: infra/terraform
        run: |
          NAME_PREFIX="${APP_NAME}-prod"

          terraform import aws_cloudwatch_log_group.frontend "/ecs/${NAME_PREFIX}/frontend" || true
          terraform import aws_cloudwatch_log_group.backend "/ecs/${NAME_PREFIX}/backend" || true

          terraform import aws_iam_role.ecs_task_execution "${NAME_PREFIX}-ecs-execution-role" || true
          terraform import aws_iam_role.ecs_task "${NAME_PREFIX}-ecs-task-role" || true
          terraform import aws_iam_role_policy_attachment.ecs_task_execution "${NAME_PREFIX}-ecs-execution-role/arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy" || true

          DEFAULT_VPC_ID=$(aws ec2 describe-vpcs --region "$AWS_REGION" --filters Name=isDefault,Values=true --query 'Vpcs[0].VpcId' --output text)
          if [ "$DEFAULT_VPC_ID" != "None" ] && [ -n "$DEFAULT_VPC_ID" ]; then
            ALB_SG_ID=$(aws ec2 describe-security-groups --region "$AWS_REGION" --filters Name=vpc-id,Values="$DEFAULT_VPC_ID" Name=group-name,Values="${NAME_PREFIX}-alb-sg" --query 'SecurityGroups[0].GroupId' --output text)
            SERVICES_SG_ID=$(aws ec2 describe-security-groups --region "$AWS_REGION" --filters Name=vpc-id,Values="$DEFAULT_VPC_ID" Name=group-name,Values="${NAME_PREFIX}-services-sg" --query 'SecurityGroups[0].GroupId' --output text)

            if [ "$ALB_SG_ID" != "None" ] && [ -n "$ALB_SG_ID" ]; then
              terraform import aws_security_group.alb "$ALB_SG_ID" || true
            fi
            if [ "$SERVICES_SG_ID" != "None" ] && [ -n "$SERVICES_SG_ID" ]; then
              terraform import aws_security_group.services "$SERVICES_SG_ID" || true
            fi
          fi

          FE_TG_ARN=$(aws elbv2 describe-target-groups --region "$AWS_REGION" --names "${NAME_PREFIX}-fe" --query 'TargetGroups[0].TargetGroupArn' --output text 2>/dev/null || true)
          BE_TG_ARN=$(aws elbv2 describe-target-groups --region "$AWS_REGION" --names "${NAME_PREFIX}-be" --query 'TargetGroups[0].TargetGroupArn' --output text 2>/dev/null || true)

          if [ "$FE_TG_ARN" != "None" ] && [ -n "$FE_TG_ARN" ]; then
            terraform import aws_lb_target_group.frontend "$FE_TG_ARN" || true
          fi
          if [ "$BE_TG_ARN" != "None" ] && [ -n "$BE_TG_ARN" ]; then
            terraform import aws_lb_target_group.backend "$BE_TG_ARN" || true
          fi

          ALB_ARN=$(aws elbv2 describe-load-balancers --region "$AWS_REGION" --names "${NAME_PREFIX}-alb" --query 'LoadBalancers[0].LoadBalancerArn' --output text 2>/dev/null || true)
          if [ "$ALB_ARN" != "None" ] && [ -n "$ALB_ARN" ]; then
            terraform import aws_lb.app "$ALB_ARN" || true

            LISTENER_ARN=$(aws elbv2 describe-listeners --region "$AWS_REGION" --load-balancer-arn "$ALB_ARN" --query 'Listeners[?Port==`80`].ListenerArn | [0]' --output text 2>/dev/null || true)
            if [ "$LISTENER_ARN" != "None" ] && [ -n "$LISTENER_ARN" ]; then
              terraform import aws_lb_listener.http "$LISTENER_ARN" || true

              RULE_ARN=$(aws elbv2 describe-rules --region "$AWS_REGION" --listener-arn "$LISTENER_ARN" --query 'Rules[?Priority==`10`].RuleArn | [0]' --output text 2>/dev/null || true)
              if [ "$RULE_ARN" != "None" ] && [ -n "$RULE_ARN" ]; then
                terraform import aws_lb_listener_rule.backend_api "$RULE_ARN" || true
              fi
            fi
          fi

          terraform import aws_ecs_cluster.app "${NAME_PREFIX}-cluster" || true
          terraform import aws_ecs_service.frontend "${NAME_PREFIX}-cluster/${NAME_PREFIX}-frontend" || true
          terraform import aws_ecs_service.backend "${NAME_PREFIX}-cluster/${NAME_PREFIX}-backend" || true

      - name: Verify ECR repositories
        run: |
          aws ecr describe-repositories --region "$AWS_REGION" --repository-names "${APP_NAME}-backend" "${APP_NAME}-frontend"

      - name: Login to Amazon ECR
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.aws-account.outputs.account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com

      - name: Build and push backend image
        run: |
          BACKEND_IMAGE=${{ steps.aws-account.outputs.account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${APP_NAME}-backend:${{ github.sha }}
          docker build -f backend/Dockerfile -t "$BACKEND_IMAGE" .
          docker push "$BACKEND_IMAGE"

      - name: Build and push frontend image
        run: |
          FRONTEND_IMAGE=${{ steps.aws-account.outputs.account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${APP_NAME}-frontend:${{ github.sha }}
          docker build -t "$FRONTEND_IMAGE" ./frontend
          docker push "$FRONTEND_IMAGE"

      - name: Apply ECS infrastructure
        working-directory: infra/terraform
        run: terraform apply -auto-approve

      - name: Capture Terraform outputs
        id: tf-outputs
        working-directory: infra/terraform
        run: |
          echo "alb_dns_name=$(terraform output -raw alb_dns_name)" >> "$GITHUB_OUTPUT"

      - name: Wait for ECS services to stabilize
        run: |
          CLUSTER_NAME="${APP_NAME}-prod-cluster"
          aws ecs wait services-stable \
            --cluster "$CLUSTER_NAME" \
            --services "${APP_NAME}-prod-frontend" "${APP_NAME}-prod-backend"

      - name: Post-deploy smoke test
        run: |
          ALB_DNS="${{ steps.tf-outputs.outputs.alb_dns_name }}"
          test -n "$ALB_DNS"

          curl --fail --show-error --silent \
            --retry 18 \
            --retry-connrefused \
            --retry-delay 10 \
            "http://${ALB_DNS}/" >/dev/null

          curl --fail --show-error --silent \
            --retry 18 \
            --retry-connrefused \
            --retry-delay 10 \
            "http://${ALB_DNS}/health" >/dev/null

          {
            echo "## Deployment Verified"
            echo
            echo "- ALB: http://${ALB_DNS}"
            echo "- Frontend `/`: OK"
            echo "- Backend `/health`: OK"
          } >> "$GITHUB_STEP_SUMMARY"
