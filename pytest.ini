[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
markers =
    asyncio: marks tests as async (deselect with '-m "not asyncio"')
    unit: fast isolated tests for modules and helpers
    integration: API and multi-component tests
    e2e: browser and full-stack quality checks
